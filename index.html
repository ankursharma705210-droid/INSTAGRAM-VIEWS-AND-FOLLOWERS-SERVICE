<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSTAGRAM VIWES BOOSTER PRO | Luxury Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --dark-gold: #B8860B;
            --black: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--black);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 215, 0, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 215, 0, 0.05) 0%, transparent 20%);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-card {
            width: 350px;
            padding: 40px 25px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 15px rgba(255, 215, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* Animated Gold Border */
        .main-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotate 6s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .inner-content {
            background: #080808;
            border-radius: 25px;
            padding: 20px;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 22px;
            margin: 0;
            background: linear-gradient(to right, #FFD700, #FFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .admin-label {
            color: var(--gold);
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: block;
        }

        .qr-wrapper {
            background: #fff;
            padding: 10px;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        input, select {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            margin-bottom: 15px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .order-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, var(--dark-gold), var(--gold));
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.4s;
        }

        .order-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.3);
        }

        .step-info {
            font-size: 11px;
            color: #777;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="inner-content">
        <h1>INSTAGRAM VIWES BOOSTER PRO</h1>
        <span class="admin-label">BY ANKUR SHARMA</span>

        <div class="qr-wrapper">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=upi://pay?pa=7052109743@superyes" alt="Payment QR">
        </div>

        <form id="orderForm">
            <input type="text" id="custName" placeholder="instagram id" required>
            <input type="url" id="instaUrl" placeholder="Instagram Real Link" required>
            <select id="viewsPlan">
              <optgroup label="🚀 INSTAGRAM VIEWS">
                <option value="5K Views - ₹30">5K Views - ₹30</option>
                <option value="10K Views - ₹60">10K Views - ₹60</option>
                <option value="20K Views - ₹120">20K Views - ₹120</option>
                <option value="50K Views - ₹300">50K Views - ₹300</option>
             <optgroup label="🚀 INSTAGRAM FOLLOWERS">
                <option value="1K Followers - ₹90">1K FOLLOWERS - ₹90</option>
                <option value="5K Followers - ₹400">5K FOLLOWERS - ₹350</option>
                <option value="10K Followers - ₹750">10K FOLLOWERS - ₹650</option>
            </optgroup>
        </select>
</select>

            <button type="button" class="order-btn" onclick="processOrder()">Confirm & Send Order</button>
        </form>

        <p class="step-info">Note: Screenshot is required on WhatsApp</p>
    </div>
</div>

<script>
function processOrder() {
    const name = document.getElementById('custName').value;
    const link = document.getElementById('instaUrl').value;
    const plan = document.getElementById('viewsPlan').value;
    const myNumber = "917052109743"; // Aapka number

    if(!name || !link) {
        alert("Bhai, saari details toh bharo!");
        return;
    }

    const text = `👑 *NEW PREMIUM ORDER* 👑\n\n` +
                 `👤 *Customer:* ${name}\n` +
                 `🔗 *Link:* ${link}\n` +
                 `🔥 *Plan:* ${plan}\n\n` +
                 `👉 *Action:* Please send the payment screenshot now!`;

    const waLink = `https://wa.me/${myNumber}?text=${encodeURIComponent(text)}`;
    window.open(waLink, '_blank');
}
</script>

</body>
</html>
